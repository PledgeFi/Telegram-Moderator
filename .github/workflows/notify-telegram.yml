name: Notify Telegram on Update

on:
  push:
    branches: [main, master]
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    environment: pledge tg moderator
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send update to Telegram topic
        env:
          NOTIFY_TOKEN_PRIMARY: ${{ secrets.TELEGRAM_NOTIFY_BOT_TOKEN }}
          NOTIFY_TOKEN_FALLBACK: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          export NOTIFY_BOT_TOKEN="${NOTIFY_TOKEN_PRIMARY:-$NOTIFY_TOKEN_FALLBACK}"
          if [ -z "$NOTIFY_BOT_TOKEN" ] || [ -z "$CHAT_ID" ] || [ -z "$TOPIC_ID" ]; then
            echo "::error::Set TELEGRAM_NOTIFY_BOT_TOKEN (or TELEGRAM_BOT_TOKEN), TELEGRAM_CHAT_ID, TELEGRAM_TOPIC_ID"
            exit 1
          fi

          python3 scripts/build-notify-message.py > /tmp/notify-message.html

          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          TOKEN = os.environ["NOTIFY_BOT_TOKEN"]
          CHAT_ID = os.environ["CHAT_ID"]
          TOPIC_ID = int(os.environ["TOPIC_ID"])
          with open("/tmp/notify-message.html", encoding="utf-8") as f:
              TEXT = f.read()
          API = f"https://api.telegram.org/bot{TOKEN}"

          def call(method, payload):
              req = urllib.request.Request(
                  f"{API}/{method}",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      result = json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  print(f"Telegram API HTTP {e.code}: {body}", file=sys.stderr)
                  raise
              if not result.get("ok"):
                  print(f"Telegram API error: {result}", file=sys.stderr)
                  raise RuntimeError(result)
              return result

          me = call("getMe", {})
          print(f"Notify bot: @{me['result'].get('username', '?')}")
          print(f"Message length: {len(TEXT)} chars")

          payload = {
              "chat_id": CHAT_ID,
              "message_thread_id": TOPIC_ID,
              "parse_mode": "HTML",
              "text": TEXT,
              "disable_web_page_preview": True,
          }

          try:
              result = call("sendMessage", payload)
          except Exception as topic_err:
              print(f"Topic send failed, retrying without topic: {topic_err}", file=sys.stderr)
              payload.pop("message_thread_id", None)
              result = call("sendMessage", payload)

          print(f"Telegram notification sent. message_id={result['result']['message_id']}")
          PY
